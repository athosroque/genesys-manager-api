version: "3.9"

services:
  backend:
    build: 
      context: ./backend
    env_file: 
      - ./backend/.env
    restart: unless-stopped
    expose:
      - "8000"
    networks:
      - genesys-net

  frontend:
    build: 
      context: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - genesys-net

networks:
  genesys-net:
    name: genesys-net
    driver: bridge
